# /etc/nginx/sites-available/backremove
#
# Deploy:
#   sudo cp this file /etc/nginx/sites-available/backremove
#   sudo ln -s /etc/nginx/sites-available/backremove /etc/nginx/sites-enabled/backremove
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ── Upstream — 1 worker only (InSPyReNet is CPU-heavy, more = OOM) ────────────
upstream cutmage_api {
    server 127.0.0.1:8000;
    keepalive 8;
}

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=3r/s;
limit_req_status 429;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.cutmage.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS block ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cutmage.com;

    # ── TLS — managed by Certbot ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.cutmage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cutmage.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Body size: must be >= MAX_FILE_SIZE + multipart overhead ──────────────
    client_max_body_size 15M;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    # InSPyReNet on CPU takes 60-180s. All timeouts MUST exceed that.
    client_body_timeout   60s;
    client_header_timeout 15s;
    send_timeout          180s;

    # THE CRITICAL FIX — was 120s (default), now 300s
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;

    # ── Block non-API paths ───────────────────────────────────────────────────
    location / {
        return 404;
    }

    # ── Health / readiness ────────────────────────────────────────────────────
    location ~ ^/(health|ready)$ {
        add_header Access-Control-Allow-Origin "*" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://cutmage_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── Inference endpoint ────────────────────────────────────────────────────
    location /v1/remove-background {
        limit_req zone=api_limit burst=10 nodelay;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://cutmage.com";
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length 0;
            return 204;
        }

        # CORS on real responses
        add_header Access-Control-Allow-Origin   "https://cutmage.com" always;
        add_header Access-Control-Allow-Methods  "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers  "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Expose-Headers "X-Request-ID, Content-Disposition" always;
        add_header Cache-Control "no-store" always;

        proxy_pass         http://cutmage_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_request_buffering on;
        proxy_buffering         on;
        proxy_buffer_size       32k;
        proxy_buffers           16 64k;
        proxy_busy_buffers_size 128k;
    }

    # ── Block scripting attacks ───────────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh)$ { return 403; }
    location ~ /\. { deny all; }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cutmage_api_access.log combined;
    error_log  /var/log/nginx/cutmage_api_error.log warn;
}
